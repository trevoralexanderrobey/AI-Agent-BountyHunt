name: Container Supply Chain

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-scan-sign:
    runs-on: ubuntu-latest
    env:
      LOCAL_RUN: ${{ env.ACT }}
    strategy:
      fail-fast: false
      matrix:
        tool:
          - aircrack
          - curl
          - ffuf
          - hashcat
          - msfvenom
          - nikto
          - nmap
          - nslookup
          - sqlmap
          - whois

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve container root
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d "containers" ]]; then
            root="containers"
          else
            echo "Unable to locate container root directory" >&2
            exit 1
          fi
          echo "CONTAINER_ROOT=${root}" >> "$GITHUB_ENV"

      - name: Validate signed execution policy artifact
        shell: bash
        run: |
          set -euo pipefail
          manifest=""
          signature=""
          public_key=""
          verifier=""
          if [[ -f "policy/execution-policy.json" ]]; then
            manifest="policy/execution-policy.json"
            signature="policy/execution-policy.json.sig"
            public_key="policy/execution-policy.pub.pem"
            verifier="policy/verify-policy-artifact.js"
          fi

          if [[ ! -f "$manifest" || ! -f "$signature" || ! -f "$public_key" || ! -f "$verifier" ]]; then
            echo "Policy artifact files not present; skipping."
            printf '%s\n' "skipped" > "policy-digest-${{ matrix.tool }}.txt"
            exit 0
          fi

          prev_manifest="$(mktemp)"
          if git cat-file -e "HEAD^:${manifest}" 2>/dev/null; then
            git show "HEAD^:${manifest}" > "$prev_manifest"
            prev_args=(--previous-manifest "$prev_manifest")
          else
            prev_args=()
          fi

          node "$verifier" \
            --production true \
            --manifest "$manifest" \
            --signature "$signature" \
            --public-key "$public_key" \
            "${prev_args[@]}"

          policy_digest="$(shasum -a 256 "$manifest" | awk '{print $1}')"
          if [[ ! "$policy_digest" =~ ^[a-f0-9]{64}$ ]]; then
            echo "Invalid policy digest output" >&2
            exit 1
          fi
          printf '%s\n' "$policy_digest" > "policy-digest-${{ matrix.tool }}.txt"

      - name: Validate secret manifest governance artifact
        shell: bash
        run: |
          set -euo pipefail
          manifest=""
          verifier=""
          if [[ -f "security/secret-manifest.json" ]]; then
            manifest="security/secret-manifest.json"
            verifier="security/verify-secret-manifest.js"
          fi

          if [[ ! -f "$manifest" || ! -f "$verifier" ]]; then
            echo "Secret manifest governance files not present; skipping."
            printf '%s\n' "skipped" > "secret-manifest-digest-${{ matrix.tool }}.txt"
            exit 0
          fi

          prev_manifest="$(mktemp)"
          if git cat-file -e "HEAD^:${manifest}" 2>/dev/null; then
            git show "HEAD^:${manifest}" > "$prev_manifest"
            prev_args=(--previous-manifest "$prev_manifest")
          else
            prev_args=()
          fi

          verification_json="$(node "$verifier" \
            --production true \
            --manifest "$manifest" \
            "${prev_args[@]}")"
          echo "$verification_json"

          secret_manifest_digest="$(printf '%s' "$verification_json" | node -e 'const fs=require("node:fs"); const payload=JSON.parse(fs.readFileSync(0,"utf8")); process.stdout.write(String(payload.secret_manifest_hash||""));')"
          if [[ ! "$secret_manifest_digest" =~ ^[a-f0-9]{64}$ ]]; then
            echo "Invalid secret manifest digest output" >&2
            exit 1
          fi
          printf '%s\n' "$secret_manifest_digest" > "secret-manifest-digest-${{ matrix.tool }}.txt"

      - name: Upload policy digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: policy-digest-${{ matrix.tool }}
          path: policy-digest-${{ matrix.tool }}.txt

      - name: Upload secret manifest digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-manifest-digest-${{ matrix.tool }}
          path: secret-manifest-digest-${{ matrix.tool }}.txt

      - name: Validate pinned Dockerfile references
        shell: bash
        run: |
          set -euo pipefail
          dockerfile="${CONTAINER_ROOT}/${{ matrix.tool }}/Dockerfile"
          if [[ ! -f "$dockerfile" ]]; then
            echo "Missing Dockerfile: $dockerfile" >&2
            exit 1
          fi
          if grep -En "FROM .*:latest" "$dockerfile"; then
            echo "':latest' is not allowed in Dockerfile" >&2
            exit 1
          fi
          if ! grep -En "^FROM .*@sha256:[a-f0-9]{64}$" "$dockerfile"; then
            echo "FROM lines must be digest pinned" >&2
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ !env.ACT }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.CONTAINER_ROOT }}/${{ matrix.tool }}/Dockerfile
          push: ${{ !env.ACT }}
          load: ${{ env.ACT }}
          provenance: ${{ !env.ACT }}
          sbom: ${{ !env.ACT }}
          tags: ghcr.io/${{ github.repository }}-${{ matrix.tool }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Enforce immutable digest output
        if: ${{ !env.ACT }}
        shell: bash
        run: |
          set -euo pipefail
          digest="${{ steps.build.outputs.digest }}"
          if [[ -z "$digest" ]]; then
            echo "Build digest is missing" >&2
            exit 1
          fi
          if [[ "$digest" != sha256:* ]]; then
            echo "Digest must be sha256" >&2
            exit 1
          fi

      - name: Set image reference
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${ACT:-}" ]]; then
            echo "IMAGE_REF=ghcr.io/${{ github.repository }}-${{ matrix.tool }}:latest" >> "$GITHUB_ENV"
          else
            echo "IMAGE_REF=ghcr.io/${{ github.repository }}-${{ matrix.tool }}@${{ steps.build.outputs.digest }}" >> "$GITHUB_ENV"
          fi

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.4

      - name: CVE scan (fail on high/critical)
        shell: bash
        run: |
          set -euo pipefail
          trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 "$IMAGE_REF"

      - name: Secret scan image layers
        shell: bash
        run: |
          set -euo pipefail
          trivy image --scanners secret --severity HIGH,CRITICAL --exit-code 1 "$IMAGE_REF"

      - name: Generate SPDX SBOM
        shell: bash
        run: |
          set -euo pipefail
          trivy image --format spdx-json --output "sbom-${{ matrix.tool }}.spdx.json" "$IMAGE_REF"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.tool }}
          path: sbom-${{ matrix.tool }}.spdx.json

      - name: Install Cosign
        if: ${{ !env.ACT }}
        uses: sigstore/cosign-installer@v3.8.1

      - name: Sign image (keyless)
        if: ${{ !env.ACT }}
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          cosign sign --yes "$IMAGE_REF"

      - name: Attest build provenance
        if: ${{ !env.ACT }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}-${{ matrix.tool }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
